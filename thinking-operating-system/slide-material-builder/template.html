<!DOCTYPE html>
<!--
  This template demonstrates the basic structure of an HTML slide deck
  using the WebSlides framework. Each <section> inside
  <article id="webslides"> corresponds to a single slide. Replace
  placeholder content with your own headings, bullet points and images.
  See the SKILL.md for design guidelines (e.g. 6×6 rule, white space,
  consistent fonts and colours).
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sample Presentation</title>
  <!-- Link to WebSlides CSS (download and host locally if offline) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/webslides/1.6.0/css/webslides.min.css">
  <!-- Optional custom styles -->
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f9f9f9;
    }
  </style>
</head>
<body>
  <article id="webslides">
    <!-- Slide 1: Title -->
    <section>
      <div class="wrap aligncenter">
        <h1>Sample Presentation</h1>
        <p>Subtitle or tagline goes here</p>
      </div>
    </section>
    <!-- Slide 2: Agenda -->
    <section>
      <div class="wrap">
        <h2>Agenda</h2>
        <ul>
          <li>Introduction</li>
          <li>Key Concepts</li>
          <li>Case Study</li>
          <li>Summary & Next Steps</li>
        </ul>
      </div>
    </section>
    <!-- Slide 3: Content Example -->
    <section>
      <div class="wrap">
        <h2>Key Concept</h2>
        <p>A short explanation of the main idea. Use concise sentences
          and break complex topics across multiple slides.</p>
      </div>
    </section>
    <!-- Add additional slides as needed -->
  </article>
</body>
</html>
